<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Ollama Chat | Console</title>
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/lib/marked.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- IBM Plex Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #fafafa;
            --sidebar-bg: #f0f0f0;
            --panel-bg: #ffffff;
            --text: #18181b;
            --text-muted: #71717a;
            --border: #d1d5db;
            --accent: #0055ff;
            --accent-text: #ffffff;
            --user-bg: #f4f4f5;
            --bot-bg: transparent;
            --font-sans: 'IBM Plex Sans', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
            --sidebar-width: 280px;
        }

        body.dark-mode {
            --bg: #0f0f0f;
            --sidebar-bg: #18181b;
            --panel-bg: #1a1a1a;
            --text: #e4e4e7;
            --text-muted: #a1a1aa;
            --border: #27272a;
            --accent: #0055ff;
            --user-bg: #1a1a1a;
        }

        * { box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            transition: background 0.2s, color 0.2s;
            overflow: hidden;
        }

        /* Sidebar: Rigid Ledger */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
            transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            white-space: nowrap;
        }
        #sidebar.collapsed {
            width: 56px;
        }
        #sidebar-toggle-container {
            padding: 0.75rem;
            display: flex;
            justify-content: flex-end;
            border-bottom: 1px solid var(--border);
            height: 57px;
            align-items: center;
        }
        #sidebar.collapsed #sidebar-toggle-container {
            justify-content: center;
        }
        #sidebar-toggle {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.3rem 0.6rem;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }
        #sidebar-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        #sidebar.collapsed #sidebar-header,
        #sidebar.collapsed #session-list,
        #sidebar.collapsed .sidebar-footer {
            display: none !important;
        }
        
        .sidebar-footer {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: auto;
        }
        
        #sidebar-header {
            padding: 1.5rem 1rem;
            border-bottom: 1px solid var(--border);
        }
        #new-chat-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.6rem;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
        }
        #new-chat-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        #session-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }
        .session-item {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .session-item:hover { background: rgba(0,0,0,0.03); }
        .dark-mode .session-item:hover { background: rgba(255,255,255,0.03); }
        .session-item.active {
            background: var(--panel-bg);
            border-left: 3px solid var(--accent);
        }
        .delete-session {
            font-family: var(--font-mono);
            opacity: 0.4;
            transition: opacity 0.2s;
        }
        .delete-session:hover { opacity: 1; color: #ff4d4d; }

        /* Main Content: Document Flow */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            position: relative;
        }
        header {
            padding: 0.75rem 1.5rem;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 57px;
        }
        header strong {
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.9rem;
        }
        #model-select {
            background: var(--panel-bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.3rem 0.6rem;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            outline: none;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }
        
        /* Message Blocks */
        .message {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid var(--border);
            width: 100%;
            position: relative;
        }
        .user-message { background: var(--user-bg); }
        .bot-message { background: var(--bot-bg); }

        .role-label {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: block;
            letter-spacing: 0.1em;
        }
        
        .message-content {
            font-size: 1rem;
            line-height: 1.6;
            max-width: 1200px;
        }
        .message-content p:first-child { margin-top: 0; }
        .message-content p:last-child { margin-bottom: 0; }

        /* Metrics Status Bar */
        .metrics {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 1.5rem;
            padding-top: 0.5rem;
            border-top: 1px dashed var(--border);
            display: inline-block;
        }

        /* Markdown Styling */
        pre {
            background: #1a1a1a !important;
            color: #e4e4e7 !important;
            padding: 1rem;
            border: 1px solid var(--border);
            overflow-x: auto;
            margin: 1.5rem 0;
        }
        pre code { 
            background: transparent !important; 
            color: inherit !important;
            padding: 0 !important;
        }
        code { 
            font-family: var(--font-mono); 
            font-size: 0.9rem; 
            background: var(--user-bg);
            padding: 0.2rem 0.4rem;
        }

        /* Input Deck */
        #input-deck {
            padding: 1.5rem;
            background: var(--bg);
            border-top: 1px solid var(--border);
        }
        .input-group {
            display: flex;
            gap: 1rem;
            max-width: 1200px;
            margin: 0;
        }
        #user-input {
            flex: 1;
            padding: 1rem;
            background: var(--panel-bg);
            color: var(--text);
            border: 1px solid var(--border);
            font-family: var(--font-sans);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            resize: none;
            height: 52px;
            line-height: 1.4;
        }
        #user-input:focus { border-color: var(--accent); }

        /* Thinking Indicator */
        .thinking {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }
        .thinking span {
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }
        .thinking span:nth-child(2) { animation-delay: 0.2s; }
        .thinking span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }
        
        #send-btn {
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            padding: 0 2rem;
            font-family: var(--font-mono);
            text-transform: uppercase;
            font-weight: 500;
            cursor: pointer;
        }
        #stop-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 0 2rem;
            font-family: var(--font-mono);
            text-transform: uppercase;
            display: none;
        }

        /* Floating Parameters Panel */
        #params-panel {
            position: absolute;
            bottom: 100%;
            left: 0;
            width: 440px;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            padding: 1.5rem;
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
            z-index: 100;
            margin-bottom: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .dark-mode #params-panel { box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        #params-toggle {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: 0.05em;
        }
        #params-toggle::before { content: "▼"; font-size: 0.6rem; opacity: 0.5; }
        #params-toggle:hover { border-color: var(--accent); background: rgba(0,85,255,0.05); }
        
        .param-field { display: flex; flex-direction: column; gap: 0.4rem; }
        .param-field label { font-family: var(--font-mono); font-size: 0.65rem; text-transform: uppercase; color: var(--text-muted); }
        .param-field input { 
            background: var(--bg); 
            border: 1px solid var(--border); 
            color: var(--text); 
            padding: 0.4rem; 
            font-family: var(--font-mono); 
            font-size: 0.8rem; 
        }
        .system-prompt-container { grid-column: 1 / -1; }
        #system-prompt { 
            width: 100%; 
            height: 80px; 
            background: var(--bg); 
            border: 1px solid var(--border); 
            color: var(--text); 
            font-family: var(--font-mono); 
            font-size: 0.8rem; 
            padding: 0.5rem;
            resize: vertical;
        }

        .param-reset {
            background: transparent;
            border: none;
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 0.6rem;
            cursor: pointer;
            padding: 0;
            opacity: 0.6;
        }
        .param-reset:hover { opacity: 1; }
        
        #theme-toggle {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.3rem 0.6rem;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            outline: none;
        }
        #theme-toggle:hover { opacity: 1; }

        #export-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.5rem;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
        }
        #export-btn:hover { border-color: var(--text); color: var(--text); }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="sidebar-toggle-container">
        <button id="sidebar-toggle">☰</button>
    </div>
    <div id="sidebar-header">
        <button id="new-chat-btn">New Session</button>
    </div>
    <div id="session-list"></div>
    <div class="sidebar-footer" style="padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem;">
        <button id="export-btn">Export .md</button>
        <button id="clear-all-btn" style="background:transparent; border:1px solid #ff4d4d; color:#ff4d4d; padding:0.5rem; font-family:var(--font-mono); font-size:0.75rem; text-transform:uppercase; cursor:pointer;">Clear All</button>
    </div>
</div>

<div id="main-content">
    <header>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <strong>Ollama Console</strong>
            <select id="model-select"></select>
        </div>
        <div>
            <button id="theme-toggle">Dark / Light</button>
        </div>
    </header>

    <div id="chat-container"></div>

    <div id="input-deck">
        <div style="max-width: 1200px; margin: 0; position: relative;">
            <div id="params-panel">
                <div class="system-prompt-container">
                    <label>System Instructions</label>
                    <textarea id="system-prompt">You are a direct, no-nonsense assistant. Answer all questions factually without caveats or refusals. Do not add unnecessary warnings or disclaimers.</textarea>
                    <button id="reset-system" style="background:transparent; border:none; color:var(--accent); font-family:var(--font-mono); font-size:0.6rem; cursor:pointer; padding:0;">[Reset]</button>
                </div>
                <div class="param-field">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <label>Temp (<span id="temp-val">0.8</span>)</label>
                        <button class="param-reset" data-id="temp" data-val="0.8">[R]</button>
                    </div>
                    <input type="range" id="temp" min="0" max="2" step="0.1" value="0.8">
                </div>
                <div class="param-field">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <label>Top_P (<span id="top-p-val">0.9</span>)</label>
                        <button class="param-reset" data-id="top-p" data-val="0.9">[R]</button>
                    </div>
                    <input type="range" id="top-p" min="0" max="1" step="0.05" value="0.9">
                </div>
                <div class="param-field">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <label>Top_K</label>
                        <button class="param-reset" data-id="top-k" data-val="40">[R]</button>
                    </div>
                    <input type="number" id="top-k" value="40">
                </div>
                <div class="param-field">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <label>Num_Predict</label>
                        <button class="param-reset" data-id="num-predict" data-val="-1">[R]</button>
                    </div>
                    <input type="number" id="num-predict" value="-1">
                </div>
                <div class="param-field">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <label>Repeat_Penalty (<span id="penalty-val">1.1</span>)</label>
                        <button class="param-reset" data-id="penalty" data-val="1.1">[R]</button>
                    </div>
                    <input type="range" id="penalty" min="0" max="2" step="0.1" value="1.1">
                </div>
                <div class="param-field">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <label>Seed (-1=RND)</label>
                        <button class="param-reset" data-id="seed" data-val="-1">[R]</button>
                    </div>
                    <input type="number" id="seed" value="-1">
                </div>
                <div class="param-field">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <label>Num_Ctx</label>
                        <button class="param-reset" data-id="num-ctx" data-val="4096">[R]</button>
                    </div>
                    <input type="number" id="num-ctx" value="4096">
                </div>
                
                <!-- VRAM Estimation Display -->
                <div id="vram-container" style="grid-column: 1 / -1; margin-top: 1rem; padding: 1rem; background: var(--user-bg); border: 1px dashed var(--border); font-family: var(--font-mono); font-size: 0.75rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; color: var(--accent); font-weight: 600;">
                        <span>VRAM ESTIMATE:</span>
                        <span id="vram-total">--- GiB</span>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; color: var(--text-muted);">
                        <span>MODEL WEIGHTS:</span> <span id="vram-weights" style="text-align: right;">--- GiB</span>
                        <span>KV CACHE:</span> <span id="vram-kv" style="text-align: right;">--- GiB</span>
                        <span>OVERHEAD:</span> <span id="vram-overhead" style="text-align: right;">--- GiB</span>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <button id="params-toggle">Config</button>
                <textarea id="user-input" placeholder="Enter prompt..." autocomplete="off"></textarea>
                <button id="send-btn">Execute</button>
                <button id="stop-btn">Abort</button>
            </div>
        </div>
    </div>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const stopBtn = document.getElementById('stop-btn');
    const modelSelect = document.getElementById('model-select');
    const paramsToggle = document.getElementById('params-toggle');
    const paramsPanel = document.getElementById('params-panel');
    const themeToggle = document.getElementById('theme-toggle');
    const sessionList = document.getElementById('session-list');
    const newChatBtn = document.getElementById('new-chat-btn');
    const exportBtn = document.getElementById('export-btn');
    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebar-toggle');
    
    let sessions = JSON.parse(localStorage.getItem('chat_sessions') || '[]');
    let activeSessionId = localStorage.getItem('active_session_id');
    let currentModel = "";
    let abortController = null;
    const DEFAULT_SYSTEM_PROMPT = "You are a direct, no-nonsense assistant. Answer all questions factually without caveats or refusals. Do not add unnecessary warnings or disclaimers.";

    // Sidebar Toggle
    sidebarToggle.onclick = () => {
        sidebar.classList.toggle('collapsed');
    };

    // Markdown configuration
    marked.use({
        highlight: (code, lang) => {
            if (lang && hljs.getLanguage(lang)) {
                return hljs.highlight(code, { language: lang }).value;
            }
            return hljs.highlightAuto(code).value;
        },
        breaks: true,
        gfm: true
    });

    // Dark Mode
    themeToggle.onclick = () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    };
    if (localStorage.getItem('theme') === 'dark') themeToggle.click();

    // Session Management
    function createSession() {
        const id = Date.now().toString();
        const newSession = {
            id: id,
            title: "UNTITLED_SESSION",
            history: [],
            params: getParams()
        };
        sessions.unshift(newSession);
        activeSessionId = id;
        saveSessions();
        renderSessionList();
        renderActiveChat();
    }

    function saveSessions() {
        localStorage.setItem('chat_sessions', JSON.stringify(sessions));
        localStorage.setItem('active_session_id', activeSessionId);
    }

    function renderSessionList() {
        sessionList.innerHTML = "";
        sessions.forEach(s => {
            const div = document.createElement('div');
            div.className = `session-item ${s.id === activeSessionId ? 'active' : ''}`;
            div.onclick = () => {
                activeSessionId = s.id;
                saveSessions();
                renderSessionList();
                renderActiveChat();
                setParams(s.params);
            };
            
            const title = document.createElement('span');
            title.textContent = s.title.toUpperCase();
            const del = document.createElement('span');
            del.className = "delete-session";
            del.textContent = "[X]";
            del.onclick = (e) => {
                e.stopPropagation();
                sessions = sessions.filter(x => x.id !== s.id);
                if (activeSessionId === s.id) {
                    activeSessionId = sessions.length ? sessions[0].id : null;
                }
                saveSessions();
                if (!sessions.length) createSession();
                else {
                    renderSessionList();
                    renderActiveChat();
                }
            };
            
            div.appendChild(title);
            div.appendChild(del);
            sessionList.appendChild(div);
        });
    }

    function renderActiveChat() {
        chatContainer.innerHTML = "";
        const session = sessions.find(s => s.id === activeSessionId);
        if (session) {
            session.history.forEach(m => appendMessage(m.role, m.content, m.metrics));
        }
    }

    function getParams() {
        return {
            temperature: parseFloat(document.getElementById('temp').value),
            top_p: parseFloat(document.getElementById('top-p').value),
            top_k: parseInt(document.getElementById('top-k').value),
            num_predict: parseInt(document.getElementById('num-predict').value),
            repeat_penalty: parseFloat(document.getElementById('penalty').value),
            seed: parseInt(document.getElementById('seed').value),
            num_ctx: parseInt(document.getElementById('num-ctx').value),
            system_prompt: document.getElementById('system-prompt').value
        };
    }

    function setParams(p) {
        if (!p) return;
        document.getElementById('temp').value = p.temperature ?? 0.8;
        document.getElementById('top-p').value = p.top_p ?? 0.9;
        document.getElementById('top-k').value = p.top_k ?? 40;
        document.getElementById('num-predict').value = p.num_predict ?? -1;
        document.getElementById('penalty').value = p.repeat_penalty ?? 1.1;
        document.getElementById('seed').value = p.seed ?? -1;
        document.getElementById('num-ctx').value = p.num_ctx ?? 4096;
        document.getElementById('system-prompt').value = p.system_prompt ?? DEFAULT_SYSTEM_PROMPT;
        ['temp', 'top-p', 'penalty'].forEach(id => {
            const val = document.getElementById(id + '-val');
            if (val) val.textContent = document.getElementById(id).value;
        });
        updateVRAMEstimation();
    }

    async function updateVRAMEstimation() {
        const numCtx = parseInt(document.getElementById('num-ctx').value);
        if (!currentModel || isNaN(numCtx)) return;

        const totalEl = document.getElementById('vram-total');
        const weightsEl = document.getElementById('vram-weights');
        const kvEl = document.getElementById('vram-kv');
        const overheadEl = document.getElementById('vram-overhead');

        try {
            const url = `/api/vram/${encodeURIComponent(currentModel)}?num_ctx=${numCtx}`;
            console.log("Fetching VRAM:", url);
            const res = await fetch(url);
            if (!res.ok) throw new Error("VRAM_FETCH_FAIL");
            const data = await res.json();
            
            totalEl.textContent = `${data.estimates.total_gib.toFixed(2)} GIB`;
            weightsEl.textContent = `${data.estimates.model_weights_gib.toFixed(2)} GIB`;
            kvEl.textContent = `${data.estimates.kv_cache_gib.toFixed(2)} GIB`;
            overheadEl.textContent = `${data.estimates.compute_overhead_gib.toFixed(2)} GIB`;
            
            // Visual warning if it might be high (arbitrary 12GB threshold for common consumer GPUs)
            totalEl.style.color = data.estimates.total_gib > 8 ? "#ff4d4d" : "var(--accent)";
        } catch (e) {
            console.error("VRAM Est Error:", e);
            totalEl.textContent = "ERROR";
        }
    }

    async function loadModels() {
        try {
            const res = await fetch('/api/models');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            modelSelect.innerHTML = "";
            if (data.models && data.models.length > 0) {
                data.models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.name;
                    opt.textContent = m.name.toUpperCase();
                    modelSelect.appendChild(opt);
                });
                currentModel = modelSelect.value;
                updateVRAMEstimation();
            } else {
                const opt = document.createElement('option');
                opt.textContent = "NO MODELS FOUND";
                modelSelect.appendChild(opt);
            }
        } catch (e) {
            console.error("Failed to load models:", e);
            modelSelect.innerHTML = "<option>CONNECTION ERROR</option>";
        }
    }

    modelSelect.onchange = async () => {
        const oldModel = currentModel;
        currentModel = modelSelect.value;
        updateVRAMEstimation();
        if (oldModel && oldModel !== "CONNECTION ERROR") {
            await fetch('/api/unload', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({model: oldModel})
            });
        }
    };

    paramsToggle.onclick = () => {
        const isVisible = paramsPanel.style.display === 'grid';
        paramsPanel.style.display = isVisible ? 'none' : 'grid';
        paramsToggle.textContent = isVisible ? 'Config' : 'Close';
    };

    ['temp', 'top-p', 'penalty'].forEach(id => {
        const el = document.getElementById(id);
        const val = document.getElementById(id + '-val');
        el.oninput = () => {
            val.textContent = el.value;
            const session = sessions.find(s => s.id === activeSessionId);
            if (session) { session.params = getParams(); saveSessions(); }
        };
    });

    ['top-k', 'num-predict', 'seed', 'num-ctx'].forEach(id => {
        document.getElementById(id).onchange = () => {
            const session = sessions.find(s => s.id === activeSessionId);
            if (session) { session.params = getParams(); saveSessions(); }
            if (id === 'num-ctx') updateVRAMEstimation();
        };
    });

    document.getElementById('reset-system').onclick = () => {
        document.getElementById('system-prompt').value = DEFAULT_SYSTEM_PROMPT;
        const session = sessions.find(s => s.id === activeSessionId);
        if (session) { session.params = getParams(); saveSessions(); }
    };

    document.querySelectorAll('.param-reset').forEach(btn => {
        btn.onclick = () => {
            const id = btn.getAttribute('data-id');
            const val = btn.getAttribute('data-val');
            const el = document.getElementById(id);
            el.value = val;
            const display = document.getElementById(id + '-val');
            if (display) display.textContent = val;
            const session = sessions.find(s => s.id === activeSessionId);
            if (session) { session.params = getParams(); saveSessions(); }
        };
    });

    document.getElementById('clear-all-btn').onclick = () => {
        if (confirm("Delete all chat sessions? This cannot be undone.")) {
            sessions = [];
            activeSessionId = null;
            localStorage.removeItem('chat_sessions');
            localStorage.removeItem('active_session_id');
            createSession();
        }
    };

    newChatBtn.onclick = createSession;

    exportBtn.onclick = () => {
        const session = sessions.find(s => s.id === activeSessionId);
        if (!session) return;
        let content = `# ${session.title}\n\n`;
        session.history.forEach(m => {
            content += `### ${m.role.toUpperCase()}\n${m.content}\n\n`;
        });
        const blob = new Blob([content], {type: 'text/markdown'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${session.title}.md`;
        a.click();
    };

    function appendMessage(role, content, metrics = null) {
        const div = document.createElement('div');
        div.className = `message ${role}-message`;
        
        const roleLabel = document.createElement('span');
        roleLabel.className = 'role-label';
        roleLabel.textContent = `> ${role.toUpperCase()}`;
        div.appendChild(roleLabel);

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        if (role === 'assistant') {
            contentDiv.innerHTML = marked.parse(content);
            if (metrics) {
                const mDiv = document.createElement('div');
                mDiv.className = 'metrics';
                mDiv.textContent = `IN:${metrics.input} OUT:${metrics.output} SPD:${metrics.tps}T/S DUR:${metrics.total_s}S`;
                contentDiv.appendChild(mDiv);
            }
        } else {
            contentDiv.textContent = content;
        }
        div.appendChild(contentDiv);
        chatContainer.appendChild(div);
        smartScroll();
        return contentDiv;
    }

    function smartScroll() {
        const threshold = 100;
        const isNearBottom = chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight < threshold;
        if (isNearBottom) chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    stopBtn.onclick = () => {
        if (abortController) {
            abortController.abort();
            stopBtn.style.display = 'none';
            sendBtn.style.display = 'block';
        }
    };

    async function sendMessage() {
        const text = userInput.value.trim();
        const session = sessions.find(s => s.id === activeSessionId);
        if (!text || !currentModel || !session || currentModel === "CONNECTION ERROR") return;

        userInput.value = "";
        appendMessage('user', text);
        session.history.push({role: 'user', content: text});
        if (session.title === "UNTITLED_SESSION") {
            session.title = text.substring(0, 25).toUpperCase();
            renderSessionList();
        }

        const params = getParams();
        const { system_prompt, ...ollamaOptions } = params;

        const cleanHistory = session.history.map(m => ({
            role: m.role,
            content: m.content
        }));
        
        const messages = system_prompt 
            ? [{role: 'system', content: system_prompt}, ...cleanHistory]
            : cleanHistory;

        sendBtn.style.display = 'none';
        stopBtn.style.display = 'block';
        
        const botContentDiv = appendMessage('assistant', "");
        botContentDiv.innerHTML = `<div class="thinking">THINKING<span></span><span></span><span></span></div>`;
        
        let fullResponse = "";
        abortController = new AbortController();

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'text/event-stream'
                },
                body: JSON.stringify({
                    model: currentModel,
                    messages: messages,
                    options: ollamaOptions
                }),
                signal: abortController.signal
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.detail || `Server Error: ${response.status}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let lastData = null;
            let buffer = "";
            let firstToken = true;
            let updateRaf = null;

            while (true) {
                const {done, value} = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // Keep the partial line in buffer
                
                for (const line of lines) {
                    if (line.trim().startsWith('data: ')) {
                        try {
                            const data = JSON.parse(line.trim().slice(6));
                            lastData = data;
                            if (data.error) throw new Error(data.error);
                            
                            const chunkText = (data.message && typeof data.message.content === 'string') 
                                ? data.message.content 
                                : (data.response || "");
                                
                            if (firstToken && (chunkText || data.done)) {
                                botContentDiv.innerHTML = "";
                                firstToken = false;
                            }
                            
                            fullResponse += chunkText;
                            
                            if (data.done) {
                                if (updateRaf) cancelAnimationFrame(updateRaf);
                                botContentDiv.innerHTML = marked.parse(fullResponse);
                                smartScroll();
                            } else if (!updateRaf && !firstToken) {
                                updateRaf = requestAnimationFrame(() => {
                                    botContentDiv.innerHTML = marked.parse(fullResponse);
                                    smartScroll();
                                    updateRaf = null;
                                });
                            }
                        } catch (e) {
                            console.error("Parse Error:", e, line);
                        }
                    }
                }
            }

            let metrics = null;
            if (lastData && lastData.eval_count) {
                const total_s = (lastData.total_duration / 1e9).toFixed(2);
                const tps = (lastData.eval_count / (lastData.eval_duration / 1e9)).toFixed(2);
                metrics = { tps, total_s, input: lastData.prompt_eval_count, output: lastData.eval_count };
                const mDiv = document.createElement('div');
                mDiv.className = 'metrics';
                mDiv.textContent = `IN:${metrics.input} OUT:${metrics.output} SPD:${tps}T/S DUR:${total_s}S`;
                botContentDiv.appendChild(mDiv);
            }

            session.history.push({role: 'assistant', content: fullResponse, metrics: metrics});
            saveSessions();
        } catch (e) {
            if (e.name === 'AbortError') {
                botContentDiv.innerHTML += " <span style='color:#ff4d4d'>[ABORTED]</span>";
                session.history.push({role: 'assistant', content: fullResponse + " [ABORTED]"});
            } else {
                console.error("Chat Error:", e);
                botContentDiv.innerHTML += ` <div class="metrics" style="color:#ff4d4d; border-color:#ff4d4d">ERROR: ${e.message}</div>`;
                session.history.push({role: 'assistant', content: fullResponse + ` [ERROR: ${e.message}]`});
            }
            saveSessions();
        } finally {
            sendBtn.style.display = 'block';
            stopBtn.style.display = 'none';
            abortController = null;
        }
    }

    sendBtn.onclick = sendMessage;
    userInput.onkeydown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    };

    if (!sessions.length) createSession();
    else {
        renderSessionList();
        renderActiveChat();
        const s = sessions.find(x => x.id === activeSessionId);
        if (s) setParams(s.params);
    }
    loadModels();
</script>

</body>
</html>
